<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal HR Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- SweetAlert 2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
      body {
        background-color: #f8f9fa;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      }
      .card-header {
        background-color: #ffffff;
        border-bottom: none;
        padding-top: 2.5rem;
        text-align: center;
        border-radius: 1rem 1rem 0 0 !important;
      }
      .card-header h3 {
        font-weight: 700;
        color: #212529;
        margin-top: 1rem;
      }
      .input-group-text {
        background-color: transparent;
        border-right: none;
        color: #6c757d;
      }
      .form-control {
        border-left: none;
      }
      .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
      }
      .btn-primary {
        background-color: #0d6efd;
        border: none;
        padding: 0.8rem;
        font-weight: 600;
        border-radius: 0.5rem;
        transition: all 0.3s;
      }
      .btn-primary:hover {
        background-color: #0b5ed7;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>

    <div class="card login-card">
      <div class="card-header">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
        <h3>Portal HR Login</h3>
      </div>
      <div class="card-body p-4">
        <form id="loginForm">
          <!-- Username -->
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <div class="form-floating">
              <input type="text" class="form-control" id="username" placeholder="Username" required>
              <label for="username">Username</label>
            </div>
          </div>

          <!-- Password -->
          <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <div class="form-floating">
              <input type="password" class="form-control" id="password" placeholder="Password" required>
              <label for="password">Password</label>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100 shadow-sm" id="loginBtn">
            LOGIN
          </button>
        </form>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        
        // Loading State
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Menghubungkan...';

        google.script.run
          .withSuccessHandler(function(isValid) {
            if (isValid) {
              Swal.fire({
                icon: 'success',
                title: 'Login Berhasil',
                text: 'Selamat datang kembali!',
                timer: 1500,
                showConfirmButton: false
              }).then(() => {
                // Arahkan ke dashboard
                window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=dashboard";
              });
            } else {
              Swal.fire({
                icon: 'error',
                title: 'Akses Ditolak',
                text: 'Username atau password salah.',
                confirmButtonColor: '#0d6efd'
              });
              loginBtn.disabled = false;
              loginBtn.innerHTML = 'LOGIN';
            }
          })
          .withFailureHandler(function(err) {
            Swal.fire({
              icon: 'error',
              title: 'Error',
              text: 'Terjadi kesalahan sistem: ' + err.message
            });
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'LOGIN';
          })
          .checkLogin(username, password);
      });
    </script>
  </body>
</html>
